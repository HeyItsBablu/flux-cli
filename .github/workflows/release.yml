name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3 etc

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: flux.exe
            artifact: flux-windows

          - os: ubuntu-latest
            output: flux
            artifact: flux-linux

          - os: macos-latest
            output: flux
            artifact: flux-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv build/Release/flux.exe ${{ matrix.output }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv build/flux ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flux-windows/flux.exe
            flux-linux/flux
            flux-macos/flux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}